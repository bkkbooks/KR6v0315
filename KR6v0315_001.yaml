body:
  text: 民國法舫師譯如是我聞一時佛為五百比丘宣說正法時諸比丘於深林中修習禪觀被諸劫賊妖魔之所擾亂而來白佛爾時世尊告諸比丘汝等可返本處修行大悲愛護一切衆生三昧猶如兵士裝備武器而自無畏汝等亦然應當裝備慈愛一切衆生三昧而諸煩擾冤魔自然消滅爾時五百比丘信受佛語而行前所劫賊悉來皈依施行恐怖者悉來侍奉施行搗亂者悉來保衛並供給諸比丘飲食衣服臥具湯藥一切所需悉皆充足如是比丘發無上意為慈愛衆生乃究竟之道於諸智慧中亦得第一由斯而得證入清淨涅槃凡諸佛子應當如是修行大悲三昧為極重要能於戒定之中而開發智慧乃佛法中之正宗綱要正直真實其心調柔而身輕安能空我慢等無明修習一切善法精進不退惟不修一切無益苦行亦不懶安享受一切虛妄欲樂一切智慧悉皆圓滿身口意業悉皆清淨廣作利益為衆福田奉為師範皆由智慧大悲之力不被纖毫塵煩之所擾亂而常行戒定慧慈愛衆生之心逐漸增強廣大精進不退悉皆平等度脫若有色衆生若無色衆生若長大身衆生若微細身衆生或能見或不能見衆生或同處或不同處衆生或已生或當生或未生衆生悉皆為彼拔一切憂苦與一切愈樂故修此大慈悲愛三昧而不惱害一切衆生亦不輕欺他人若被一切人來擾亂悉皆能忍三業清淨四相皆空慈愛衆生如母愛子較愛自身猶切如是慈悲正道普遍愛護無量無邊衆生冤親平等無間國際種族不分人我是非凡宇宙一切衆生乃至無情草木猶不加損害悉使共榮生存修此慈悲三昧無論行住坐臥或工作或閒暇無令忘失斯乃極大無比之威德能生一切善能滅一切惡所以世尊普勸修持乃最上一乘之道依此修持則被一切衆生特別恭敬則能消除一切衆生之我見等煩惱並可解脫一切衆生之生死妄執而堅固信念八正道四聖諦之實相如是修持自然消滅一切貪妄之苦而證入最後涅槃凡遇一切不祥事憂悲苦惱纍人生若念佛陀威德力究竟解脫悉清靜凡遇一切不祥事憂悲苦惱纍人生若念達摩三藏力究竟解脫悉清靜凡遇一切不祥事憂悲苦惱纍人生若念比丘加持力究竟解脫悉清淨慚愧恐怖諸惡業聞法精進捨國城正信同修戒定慧聖財七寶超世人
